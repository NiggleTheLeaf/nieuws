<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#043d29">
  <title>Story Archive — The Mopane</title>
  <meta name="description" content="Every published story from The Mopane's pan-African newsroom.">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#0a2a1d;--green:#043d29;--deep:#022b1d;--paper:#f4f8f4;--gold:#cba24b;--line:rgba(4,61,41,.17);--muted:#5d7268}*{box-sizing:border-box}html{-webkit-text-size-adjust:100%}body{margin:0;background:var(--paper);color:var(--ink);font-family:"DM Sans",sans-serif}a{color:inherit;text-decoration:none}button,input{font:inherit}.top{height:4px;background:linear-gradient(90deg,var(--green) 70%,var(--gold) 70%)}nav{height:74px;padding:0 4.5vw;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);background:rgba(244,248,244,.92);backdrop-filter:blur(14px);position:sticky;top:0;z-index:20}.brand{font:600 29px "Instrument Serif",serif;letter-spacing:.08em;display:flex;align-items:center;gap:10px}.mark{width:15px;height:15px;border-radius:50%;background:var(--green);box-shadow:inset -4px -2px 0 var(--gold)}.back{font-size:10px;text-transform:uppercase;letter-spacing:.12em;font-weight:700}.hero{padding:90px 4.5vw 65px;background:radial-gradient(circle at 82% 35%,#d2ebdf,transparent 28%),linear-gradient(180deg,#f4f8f4,#e5f1ea)}.eyebrow{font-size:10px;text-transform:uppercase;letter-spacing:.16em;color:var(--green);font-weight:800}.hero h1{font:400 clamp(58px,8vw,105px)/.9 "Instrument Serif",serif;letter-spacing:-.04em;margin:22px 0}.hero p{max-width:550px;color:var(--muted);font-size:14px;line-height:1.7}.controls{padding:26px 4.5vw;display:flex;gap:12px;align-items:center;border-bottom:1px solid var(--line);background:#fff;position:sticky;top:74px;z-index:15}.search{flex:1;max-width:520px;border:1px solid var(--line);border-radius:999px;padding:12px 18px;background:var(--paper);outline:none}.search:focus{border-color:var(--gold)}.filters{display:flex;gap:7px;overflow:auto;scrollbar-width:none}.filters::-webkit-scrollbar{display:none}.filters button{border:1px solid var(--line);background:transparent;border-radius:999px;padding:10px 13px;white-space:nowrap;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}.filters button.active{background:var(--green);color:#fff}.archive{padding:46px 4.5vw 90px}.count{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:22px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}.card{min-height:265px;padding:23px;border:1px solid var(--line);border-radius:14px;background:#fff;display:flex;flex-direction:column;transition:.25s}.card:hover{transform:translateY(-4px);border-color:var(--gold);box-shadow:0 16px 35px rgba(4,61,41,.09)}.place{font-size:9px;text-transform:uppercase;letter-spacing:.13em;color:#08734a;font-weight:800}.card h2{font:400 27px/1.08 "Instrument Serif",serif;margin:22px 0 13px}.card p{font-size:11px;line-height:1.55;color:var(--muted);margin:0}.meta{margin-top:auto;padding-top:20px;display:flex;justify-content:space-between;font-size:9px;color:var(--muted)}.empty{grid-column:1/-1;text-align:center;padding:80px;color:var(--muted)}footer{padding:28px 4.5vw;border-top:1px solid var(--line);display:flex;justify-content:space-between;color:var(--muted);font-size:10px}@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}.controls{align-items:stretch;flex-direction:column}.search{max-width:none}.controls{top:74px}}@media(max-width:600px){nav{padding-left:max(16px,env(safe-area-inset-left));padding-right:max(16px,env(safe-area-inset-right))}.brand{font-size:22px}.hero{padding:64px 20px 48px}.controls{padding:16px 20px}.archive{padding:35px 20px 70px}.grid{grid-template-columns:1fr}.card{min-height:235px}.card:hover{transform:none}footer{padding:25px 20px max(25px,env(safe-area-inset-bottom));display:block}footer span{display:block;margin-top:10px}}
  </style>
</head>
<body><div class="top"></div><nav><a class="back" href="index.html">← Live atlas</a><a class="brand" href="index.html"><span class="mark"></span>THE MOPANE</a><span class="back">All dispatches</span></nav>
  <header class="hero"><div class="eyebrow">The permanent record</div><h1>Story archive.</h1><p>The newest work appears first. Every older dispatch remains here—searchable, linkable and free to read.</p></header>
  <section class="controls"><input class="search" id="search" type="search" placeholder="Search headline, city or country…" aria-label="Search stories"><div class="filters" id="filters"></div></section>
  <main class="archive"><div class="count" id="count"></div><div class="grid" id="grid"></div></main>
  <footer><a class="brand" href="index.html" style="font-size:21px"><span class="mark"></span>THE MOPANE</a><span>Independent. Online. Free to read.</span></footer>
  <script src="site-config.js"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="cms.js"></script><script src="stories-data.js"></script><script>
    let stories=window.MOPANE_STORIES||[];const grid=document.getElementById('grid'),search=document.getElementById('search'),filters=document.getElementById('filters');let section='All';
    function renderFilters(){const sections=['All',...new Set(stories.map(s=>s.section).sort())];filters.innerHTML=sections.map(s=>`<button class="${s===section?'active':''}" data-section="${s}">${s}</button>`).join('')};renderFilters();
    function render(){const q=search.value.trim().toLowerCase();const shown=stories.filter(s=>(section==='All'||s.section===section)&&(!q||[s.title,s.dek,s.country,s.city,s.section].join(' ').toLowerCase().includes(q)));document.getElementById('count').textContent=`${shown.length} ${shown.length===1?'story':'stories'}`;grid.innerHTML=shown.length?shown.map(s=>`<a class="card" href="story.html?id=${s.id}"><span class="place">${s.city}, ${s.country} · ${s.section}</span><h2>${s.title}</h2><p>${s.dek}</p><span class="meta"><span>${new Date(s.published).toLocaleDateString(undefined,{day:'numeric',month:'short',year:'numeric'})}</span><span>${s.read||'5 min'} read →</span></span></a>`).join(''):'<div class="empty">No stories match that search.</div>'}
    search.addEventListener('input',render);filters.addEventListener('click',e=>{const b=e.target.closest('[data-section]');if(!b)return;section=b.dataset.section;filters.querySelectorAll('button').forEach(x=>x.classList.toggle('active',x===b));render()});render();(async()=>{if(window.MopaneCMS?.configured){try{const live=await window.MopaneCMS.publishedStories();if(live.length){stories=live;renderFilters();render()}}catch(e){}window.MopaneCMS.trackView()}})();
  </script>
</body></html>
